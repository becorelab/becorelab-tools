<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 30%, #1a0a00 0%, #0d0d0d 100%);
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      perspective: 1000px;
    }

    .scene {
      transform: rotateX(6deg) rotateY(-4deg);
      transform-style: preserve-3d;
      filter: drop-shadow(0 40px 60px rgba(255, 100, 0, 0.25));
    }

    .calculator {
      width: 340px;
      background: linear-gradient(160deg, #2a2a2a 0%, #1a1a1a 100%);
      border-radius: 24px;
      padding: 24px 20px 20px;
      transform-style: preserve-3d;
      position: relative;
      box-shadow:
        0 2px 0 #111,
        0 4px 0 #0e0e0e,
        0 6px 0 #0b0b0b,
        0 8px 0 #080808,
        0 10px 0 #050505,
        0 12px 30px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* 측면 그림자 효과 */
    .calculator::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .display {
      background: linear-gradient(180deg, #0f0f0f 0%, #141414 100%);
      border-radius: 14px;
      padding: 20px 20px 16px;
      margin-bottom: 18px;
      text-align: right;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      box-shadow:
        inset 0 4px 12px rgba(0,0,0,0.8),
        inset 0 1px 3px rgba(0,0,0,0.9),
        0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .display::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,150,50,0.15), transparent);
      border-radius: 14px 14px 0 0;
    }

    .expression {
      font-size: 13px;
      color: rgba(255, 130, 50, 0.45);
      min-height: 18px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .result {
      font-size: 44px;
      font-weight: 200;
      color: #fff;
      letter-spacing: -1.5px;
      text-shadow: 0 0 20px rgba(255, 120, 30, 0.4);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.1s;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      height: 72px;
      border-radius: 14px;
      outline: none;
      font-family: inherit;
      position: relative;
      transition: transform 0.08s, box-shadow 0.08s;
      letter-spacing: -0.3px;
      transform-style: preserve-3d;
    }

    /* 기본 숫자 버튼 */
    button.num {
      background: linear-gradient(170deg, #353535 0%, #282828 100%);
      color: #f0f0f0;
      box-shadow:
        0 6px 0 #1a1a1a,
        0 7px 8px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }
    button.num:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #1a1a1a,
        0 3px 4px rgba(0,0,0,0.4),
        inset 0 2px 4px rgba(0,0,0,0.3);
    }

    /* 기능 버튼 (AC, +/-, %) */
    button.fn {
      background: linear-gradient(170deg, #444 0%, #333 100%);
      color: #ccc;
      font-size: 15px;
      box-shadow:
        0 6px 0 #222,
        0 7px 8px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }
    button.fn:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #222,
        0 3px 4px rgba(0,0,0,0.4),
        inset 0 2px 4px rgba(0,0,0,0.3);
    }

    /* 연산자 버튼 */
    button.op {
      background: linear-gradient(170deg, #ff7520 0%, #e05500 100%);
      color: #fff;
      font-size: 22px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      box-shadow:
        0 6px 0 #9c3200,
        0 7px 15px rgba(255, 100, 0, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }
    button.op:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #9c3200,
        0 3px 8px rgba(255, 100, 0, 0.3),
        inset 0 2px 4px rgba(0,0,0,0.2);
    }
    button.op.active-op {
      background: linear-gradient(170deg, #fff 0%, #ffe8d6 100%);
      color: #e05500;
    }

    /* = 버튼 */
    button.equals {
      background: linear-gradient(170deg, #ff8c35 0%, #ff5500 100%);
      color: #fff;
      font-size: 26px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      box-shadow:
        0 6px 0 #9c2d00,
        0 7px 20px rgba(255, 80, 0, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }
    button.equals:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #9c2d00,
        0 3px 10px rgba(255, 80, 0, 0.35),
        inset 0 2px 4px rgba(0,0,0,0.2);
    }

    button.zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 26px;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="calculator">
      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="fn" onclick="clearAll()">AC</button>
        <button class="fn" onclick="toggleSign()">+/−</button>
        <button class="fn" onclick="percentage()">%</button>
        <button class="op" id="op-÷" onclick="setOp('÷')">÷</button>

        <button class="num" onclick="input('7')">7</button>
        <button class="num" onclick="input('8')">8</button>
        <button class="num" onclick="input('9')">9</button>
        <button class="op" id="op-×" onclick="setOp('×')">×</button>

        <button class="num" onclick="input('4')">4</button>
        <button class="num" onclick="input('5')">5</button>
        <button class="num" onclick="input('6')">6</button>
        <button class="op" id="op-−" onclick="setOp('−')">−</button>

        <button class="num" onclick="input('1')">1</button>
        <button class="num" onclick="input('2')">2</button>
        <button class="num" onclick="input('3')">3</button>
        <button class="op" id="op-+" onclick="setOp('+')">+</button>

        <button class="num zero" onclick="input('0')">0</button>
        <button class="num" onclick="inputDot()">.</button>
        <button class="equals" onclick="calculate()">=</button>
      </div>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = '';
    let operator = '';
    let shouldReset = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');
    const ops = ['÷', '×', '−', '+'];

    function updateDisplay() {
      resultEl.textContent = current;
      const len = current.replace('-', '').length;
      resultEl.style.fontSize = len > 10 ? '22px' : len > 7 ? '32px' : len > 5 ? '38px' : '44px';
    }

    function setActiveOp(op) {
      ops.forEach(o => document.getElementById('op-' + o)?.classList.remove('active-op'));
      if (op) document.getElementById('op-' + op)?.classList.add('active-op');
    }

    function input(val) {
      if (shouldReset) { current = val; shouldReset = false; }
      else { current = current === '0' ? val : current + val; if (current.length > 12) return; }
      setActiveOp(null);
      updateDisplay();
    }

    function inputDot() {
      if (shouldReset) { current = '0.'; shouldReset = false; updateDisplay(); return; }
      if (!current.includes('.')) { current += '.'; updateDisplay(); }
    }

    function setOp(op) {
      if (operator && !shouldReset) calculate(true);
      previous = current;
      operator = op;
      shouldReset = true;
      expressionEl.textContent = previous + ' ' + operator;
      setActiveOp(op);
    }

    function calculate(chain = false) {
      if (!operator || !previous) return;
      const a = parseFloat(previous), b = parseFloat(current);
      let res;
      if (operator === '+') res = a + b;
      else if (operator === '−') res = a - b;
      else if (operator === '×') res = a * b;
      else if (operator === '÷') res = b !== 0 ? a / b : 'Error';
      if (!chain) {
        expressionEl.textContent = previous + ' ' + operator + ' ' + current + ' =';
        operator = '';
        setActiveOp(null);
      }
      current = res === 'Error' ? 'Error' : parseFloat(res.toFixed(10)).toString();
      previous = '';
      shouldReset = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0'; previous = ''; operator = '';
      expressionEl.textContent = '';
      shouldReset = false;
      setActiveOp(null);
      updateDisplay();
    }

    function toggleSign() {
      if (current === '0' || current === 'Error') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay();
    }

    function percentage() {
      current = (parseFloat(current) / 100).toString();
      updateDisplay();
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOp('+');
      else if (e.key === '-') setOp('−');
      else if (e.key === '*') setOp('×');
      else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
