<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gothic+A1:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif}
.page{max-width:780px;margin:0 auto}
.sec{padding:80px 44px;background:#F4EFE6}
.eyebrow{font-size:13px;letter-spacing:3px;color:#B0925E;font-weight:800;margin-bottom:22px}
/* ★ 어제 분석대로: 초대형 위계 + 굵은 한글 브랜드폰트 */
.bighead{
  font-family:'Gothic A1',sans-serif;font-weight:900;
  font-size:46px;line-height:1.3;letter-spacing:-1.5px;color:#2E2820;
}
.bighead .hl{background:linear-gradient(transparent 58%,#E7D4AE 58%);padding:0 4px}
.bighead .g{color:#B0925E}
.sub{font-family:'Gothic A1';font-weight:500;font-size:17px;color:#8A7E6F;margin-top:24px;line-height:1.8}
/* 초대형 숫자 (라비킷식) */
.bignum{font-family:'Black Han Sans';font-size:96px;color:#7E8B6A;line-height:1;margin:40px 0 6px;letter-spacing:-2px}
.numlabel{font-family:'Gothic A1';font-weight:700;font-size:16px;color:#2E2820}
.divider{height:1px;background:#DDD2C0;margin:60px 0}
</style>
</head>
<body>
<div class="page">
  <section class="sec">
    <div class="eyebrow">THE REAL PROBLEM</div>
    <div class="bighead">덮으면 그때뿐,<br><span class="hl">생활취</span>는<br>다시 <span class="g">돌아옵니다</span></div>
    <div class="sub">향으로 가려도 며칠이면 돌아오는 냄새.<br>핵심은 냄새 분자를 <b style="color:#B0925E">붙잡는 것</b>입니다.</div>

    <div class="divider"></div>

    <div class="eyebrow">SCENT POWER</div>
    <div class="bignum">270<span style="font-size:44px">g</span></div>
    <div class="numlabel">넉넉한 용량, 한 통으로 오래</div>
  </section>
</div>
</body>
</html>
