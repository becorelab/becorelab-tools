<style>
.kakao-login-btn {
	width:100% !important;
	margin-bottom:30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 55px;
  padding: 0 20px;
  background-color: #FEE500;
  color: #000000 !important;
  text-decoration: none;
  border-radius: 12px;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  font-weight: 700 !important;
  font-size: 15px !important;
  transition: background-color 0.2s;
}

.kakao-login-btn:hover {
  background-color: #FADA00; /* 호버 시 약간 어둡게 */
}

/* 말풍선 몸통 */
.kakao-symbol {
  position: relative;
  width: 18px;
  height: 16px;
  background-color: #000000;
  border-radius: 50% / 50%; /* 타원형 */
  margin-right: 8px;
  margin-top: -1px; /* 텍스트와 정렬 맞춤 */
}

/* 말풍선 꼬리 */
.kakao-symbol::after {
  content: "";
  position: absolute;
  right: 2px;
  bottom: -2px;
  border-top: 5px solid #000000;
  border-left: 2px solid transparent;
  border-right: 2px solid transparent;
  transform: rotate(-35deg); /* 꼬리 각도 */
}
</style>
